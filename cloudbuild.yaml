steps:
  # 1. Build da imagem (permanece igual)
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/extrator-sinasc'
      - '.'

  # 2. Executa o container usando o daemon do Docker local
  - name: 'gcr.io/cloud-builders/docker'
    id: 'run-extraction'
    args:
      - 'run'
      - 'gcr.io/$PROJECT_ID/extrator-sinasc'

options:
  logging: CLOUD_LOGGING_ONLY

timeout: 3600s